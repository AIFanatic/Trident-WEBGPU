
    <!DOCTYPE html>
    <html>
        <head>
            <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
            <meta name="mobile-web-app-capable" content="yes">
            <meta name="apple-mobile-web-app-capable" content="yes">
            <meta charset="UTF-8">
            
            <style>
                html, body {
                    margin: 0;
                    overflow: hidden;
                    width: 100%;
                    height: 100%;
                }
            </style>
        </head>
        <body>
            <script type="importmap">
                {
                    "imports": {
                        "@trident/core": "../trident-core.js",
                        "@trident/plugins/": "../plugins/"
                    }
                }
            </script>
            <script type="module">
                const canvas = document.createElement("canvas");
                document.body.appendChild(canvas);
                            import { Runtime, GameObject, Components, Mathf, PBRMaterial } from '@trident/core';
            import { OrbitControls } from '@trident/plugins/OrbitControls.js';
            import { GLTFLoader } from '@trident/plugins/GLTF/GLTFLoader.js';
            import { ImpostorMesh } from '@trident/plugins/Impostors/ImpostorMesh.js';
            import { Debugger } from '@trident/plugins/Debugger.js';
            import { UITextureViewer } from '@trident/plugins/ui/UIStats.js';
            import { HDRParser } from '@trident/plugins/HDRParser.js';
            import { Environment } from '@trident/plugins/Environment/Environment.js';
            
            async function Application(canvas) {
              await Runtime.Create(canvas);
              const scene = Runtime.SceneManager.CreateScene("DefaultScene");
              Runtime.SceneManager.SetActiveScene(scene);
              const mainCameraGameObject = new GameObject();
              mainCameraGameObject.transform.position.set(0, 0, -5);
              mainCameraGameObject.name = "MainCamera";
              const camera = mainCameraGameObject.AddComponent(Components.Camera);
              camera.SetPerspective(72, canvas.width / canvas.height, 0.01, 500);
              new OrbitControls(canvas, camera);
              {
                const lightGameObject = new GameObject();
                lightGameObject.transform.position.set(-4, 4, -4);
                lightGameObject.transform.LookAtV1(new Mathf.Vector3(0, 0, 0));
                const light = lightGameObject.AddComponent(Components.DirectionalLight);
                light.intensity = 1;
                light.range = 1;
                light.color.set(1, 1, 1, 1);
                const hdr = await HDRParser.Load("./assets/textures/HDR/spruit_sunrise_1k.hdr");
                const skyTexture = await HDRParser.ToCubemap(hdr);
                const environment = new Environment(scene, skyTexture);
                await environment.init();
              }
              const loadedGO = await GLTFLoader.Load("/extra/test-assets/nature/treessource/american_beech/american_beech_a.glb", scene);
              let geometry;
              let material = new PBRMaterial();
              const loadedMeshes = loadedGO.GetComponentsInChildren(Components.Mesh);
              for (const mesh of loadedMeshes) {
                geometry = mesh.geometry;
                material = mesh.material;
                break;
              }
              const go = new GameObject();
              const bunnyImpostor = go.AddComponent(ImpostorMesh);
              await bunnyImpostor.Create(geometry, material);
              new UITextureViewer(Debugger.ui, "Atlas", bunnyImpostor.albedoTexture);
              new UITextureViewer(Debugger.ui, "Atlas2", bunnyImpostor.normalTexture);
              {
                loadedGO.transform.position.set(3, 0, 0);
              }
              Debugger.Enable();
              Runtime.Play();
            }
            Application(document.querySelector("canvas"));
            
            </script>
        </body>
    </html>
