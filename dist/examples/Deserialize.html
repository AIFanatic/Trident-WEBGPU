
    <!DOCTYPE html>
    <html>
        <head>
            <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
            <meta name="mobile-web-app-capable" content="yes">
            <meta name="apple-mobile-web-app-capable" content="yes">
            <meta charset="UTF-8">
            
            <style>
                html, body {
                    margin: 0;
                    overflow: hidden;
                    width: 100%;
                    height: 100%;
                }
            </style>
        </head>
        <body>
            <script type="importmap">
                {
                    "imports": {
                        "@trident/core": "../trident-core.js",
                        "@trident/plugins/": "../plugins/"
                    }
                }
            </script>
            <script type="module">
                const canvas = document.createElement("canvas");
                document.body.appendChild(canvas);
                            import { Runtime, Component, Assets, Deserializer, Components } from '@trident/core';
            import { OrbitControls } from '@trident/plugins/OrbitControls.js';
            import { Debugger } from '@trident/plugins/Debugger.js';
            import { Terrain } from '@trident/plugins/Terrain/Terrain.js';
            import { PhysicsRapier } from '@trident/plugins/PhysicsRapier/PhysicsRapier.js';
            import { TerrainCollider } from '@trident/plugins/PhysicsRapier/colliders/TerrainCollider.js';
            
            async function Application(canvas) {
              await Runtime.Create(canvas);
              const scene = Runtime.SceneManager.CreateScene("DefaultScene");
              Runtime.SceneManager.SetActiveScene(scene);
              Runtime.AddSystem(PhysicsRapier);
              Component.Registry.set(TerrainCollider.type, TerrainCollider);
              Component.Registry.set(Terrain.type, Terrain);
              const PROJECT_ROOT = "/extra/SampleProject";
              Assets.ResourceFetchFn = (input, init) => {
                const url = typeof input === "string" && !input.startsWith("http") ? PROJECT_ROOT + (input.startsWith("/") ? input : "/" + input) : input;
                return fetch(url, init);
              };
              const data = await fetch("/extra/SampleProject/TestScene.scene").then((response) => response.json());
              await Deserializer.deserializeScene(scene, data);
              Debugger.Enable();
              new OrbitControls(canvas, Components.Camera.mainCamera);
              Runtime.Play();
            }
            Application(document.querySelector("canvas"));
            
            </script>
        </body>
    </html>
