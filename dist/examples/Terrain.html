
    <!DOCTYPE html>
    <html>
        <head>
            <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
            <meta name="mobile-web-app-capable" content="yes">
            <meta name="apple-mobile-web-app-capable" content="yes">
            <meta charset="UTF-8">
            
            <style>
                html, body {
                    margin: 0;
                    overflow: hidden;
                    width: 100%;
                    height: 100%;
                }
            </style>
        </head>
        <body>
            <script type="importmap">
                {
                    "imports": {
                        "@trident/core": "../trident-core.js",
                        "@trident/plugins/": "../plugins/"
                    }
                }
            </script>
            <script type="module">
                const canvas = document.createElement("canvas");
                document.body.appendChild(canvas);
                            import { Runtime, GameObject, Components, Mathf, Geometry, PBRMaterial, GPU } from '@trident/core';
            import { OrbitControls } from '@trident/plugins/OrbitControls.js';
            import { Terrain } from '@trident/plugins/Terrain/Terrain.js';
            import { Debugger } from '@trident/plugins/Debugger.js';
            import { WireframePass } from '@trident/plugins/WireframePass.js';
            
            async function Application(canvas) {
              await Runtime.Create(canvas);
              const scene = Runtime.SceneManager.CreateScene("DefaultScene");
              Runtime.SceneManager.SetActiveScene(scene);
              const mainCameraGameObject = new GameObject(scene);
              mainCameraGameObject.transform.position.set(0, 0, -15);
              mainCameraGameObject.name = "MainCamera";
              const camera = mainCameraGameObject.AddComponent(Components.Camera);
              camera.SetPerspective(72, canvas.width / canvas.height, 0.5, 1e6);
              mainCameraGameObject.transform.position.set(0, 0, 20);
              mainCameraGameObject.transform.LookAtV1(new Mathf.Vector3(0, 0, 0));
              new OrbitControls(canvas, camera);
              const lightGameObject = new GameObject(scene);
              lightGameObject.transform.position.set(-4, 4, -4);
              lightGameObject.transform.LookAtV1(new Mathf.Vector3(0, 0, 0));
              lightGameObject.AddComponent(Components.DirectionalLight);
              const terrainGameObject = new GameObject(scene);
              terrainGameObject.AddComponent(Terrain);
              {
                const sphereGameObject = new GameObject(scene);
                sphereGameObject.transform.scale.set(1e3, 1, 1);
                const sphereMesh = sphereGameObject.AddComponent(Components.Mesh);
                sphereMesh.geometry = Geometry.Cube();
                const mat = new PBRMaterial({ albedoColor: new Mathf.Color(1, 1, 1), metalness: 0, roughness: 1 });
                sphereMesh.material = mat;
              }
              const wireframe = new WireframePass();
              wireframe.color = [1, 1, 1];
              wireframe.enabled = true;
              Runtime.Renderer.RenderPipeline.AddPass(wireframe, GPU.RenderPassOrder.AfterLighting);
              Debugger.Enable();
              Runtime.Play();
            }
            Application(document.querySelector("canvas"));
            
            </script>
        </body>
    </html>
