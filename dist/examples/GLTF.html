
    <!DOCTYPE html>
    <html>
        <head>
            <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
            <meta name="mobile-web-app-capable" content="yes">
            <meta name="apple-mobile-web-app-capable" content="yes">
            <meta charset="UTF-8">
            
            <style>
                html, body {
                    margin: 0;
                    overflow: hidden;
                    width: 100%;
                    height: 100%;
                }
            </style>
        </head>
        <body>
            <script type="importmap">
                {
                    "imports": {
                        "@trident/core": "../trident-core.js",
                        "@trident/plugins/": "../plugins/"
                    }
                }
            </script>
            <script type="module">
                const canvas = document.createElement("canvas");
                document.body.appendChild(canvas);
                            import { Runtime, GameObject, Components, Mathf } from '@trident/core';
            import { OrbitControls } from '@trident/plugins/OrbitControls.js';
            import { GLTFLoader } from '@trident/plugins/GLTF/GLTFLoader.js';
            import { Debugger } from '@trident/plugins/Debugger.js';
            import { HDRParser } from '@trident/plugins/HDRParser.js';
            import { Environment } from '@trident/plugins/Environment/Environment.js';
            
            async function Application(canvas) {
              await Runtime.Create(canvas);
              const scene = Runtime.SceneManager.CreateScene("DefaultScene");
              Runtime.SceneManager.SetActiveScene(scene);
              const mainCameraGameObject = new GameObject(scene);
              mainCameraGameObject.transform.position.set(0, 0, -15);
              mainCameraGameObject.name = "MainCamera";
              const camera = mainCameraGameObject.AddComponent(Components.Camera);
              camera.SetPerspective(60, canvas.width / canvas.height, 0.05, 1e3);
              mainCameraGameObject.transform.position.set(0, 0, 2);
              mainCameraGameObject.transform.LookAtV1(new Mathf.Vector3(0, 0, 0));
              new OrbitControls(canvas, camera);
              const lightGameObject = new GameObject(scene);
              lightGameObject.transform.position.set(2, 0, 0);
              lightGameObject.transform.LookAtV1(new Mathf.Vector3(0, 0, 0));
              const light = lightGameObject.AddComponent(Components.DirectionalLight);
              light.castShadows = false;
              light.intensity = 2;
              const hdr = await HDRParser.Load("/dist/examples/assets/textures/HDR/autumn_field_puresky_1k.hdr");
              const skyTexture = await HDRParser.ToCubemap(hdr);
              const environment = new Environment(scene, skyTexture);
              await environment.init();
              const rootGO = await GLTFLoader.Load("./assets/models/Shadow.glb", scene);
              const meshComponents = rootGO.GetComponentsInChildren(Components.Mesh);
              for (const mesh of meshComponents) {
                const animator = mesh.gameObject.GetComponent(Components.Animator);
                if (animator) {
                  console.log(animator);
                  break;
                }
              }
              {
                const gameObject = await GLTFLoader.Load("./assets/models/Shadow.glb", scene);
                gameObject.transform.position.x = 2;
                const animator = gameObject.GetComponent(Components.Animator);
                animator.SetClipByIndex(45);
              }
              {
                const gameObject = await GLTFLoader.Load("/extra/test-assets/bouquet.glb", scene);
                gameObject.transform.position.x = -2;
                const animator = gameObject.GetComponent(Components.Animator);
                console.log(animator);
              }
              console.warn(`
                    glb imports to:
                        mesh
                        material
                        shader (always pbr)
                        animation
                        bones/skin
            
                    even on editor create those files separately (can deal with animation and bones later)
                `);
              {
                window.addEventListener("dragover", (e) => {
                  e.preventDefault();
                });
                window.addEventListener("drop", async (e) => {
                  e.preventDefault();
                  const file = e.dataTransfer?.files?.[0];
                  if (!file) return;
                  const url = URL.createObjectURL(file);
                  const obj = await GLTFLoader.Load(url, scene, "glb");
                  console.log(obj);
                });
              }
              Debugger.Enable();
              Runtime.Play();
            }
            Application(document.querySelector("canvas"));
            
            </script>
        </body>
    </html>
