
    <!DOCTYPE html>
    <html>
        <head>
            <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
            <meta name="mobile-web-app-capable" content="yes">
            <meta name="apple-mobile-web-app-capable" content="yes">
            <meta charset="UTF-8">
            
            <style>
                html, body {
                    margin: 0;
                    overflow: hidden;
                    width: 100%;
                    height: 100%;
                }
            </style>
        </head>
        <body>
            <script type="importmap">
                {
                    "imports": {
                        "@trident/core": "../trident-core.js",
                        "@trident/plugins/": "../plugins/"
                    }
                }
            </script>
            <script type="module">
                const canvas = document.createElement("canvas");
                document.body.appendChild(canvas);
                            import { Runtime, GameObject, Components, Mathf, PBRMaterial, Geometry, VertexAttribute, IndexAttribute } from '@trident/core';
            import { OrbitControls } from '@trident/plugins/OrbitControls.js';
            import { Debugger } from '@trident/plugins/Debugger.js';
            import { HDRParser } from '@trident/plugins/HDRParser.js';
            import { Environment } from '@trident/plugins/Environment/Environment.js';
            
            async function Application(canvas) {
              function HighQualitySphere(radius = 0.5, widthSegments = 16, heightSegments = 16) {
                const vertices = [];
                const normals = [];
                const uvs = [];
                const indices = [];
                for (let y = 0; y <= heightSegments; y++) {
                  const v = y / heightSegments;
                  const theta = v * Math.PI;
                  const sinTheta = Math.sin(theta);
                  const cosTheta = Math.cos(theta);
                  for (let x = 0; x <= widthSegments; x++) {
                    const u = x / widthSegments;
                    const phi = u * Math.PI * 2;
                    const sinPhi = Math.sin(phi);
                    const cosPhi = Math.cos(phi);
                    const nx = -cosPhi * sinTheta;
                    const ny = cosTheta;
                    const nz = sinPhi * sinTheta;
                    vertices.push(radius * nx, radius * ny, radius * nz);
                    normals.push(nx, ny, nz);
                    uvs.push(u, 1 - v);
                  }
                }
                for (let y = 0; y < heightSegments; y++) {
                  for (let x = 0; x < widthSegments; x++) {
                    const a = y * (widthSegments + 1) + x;
                    const b = a + widthSegments + 1;
                    const c2 = b + 1;
                    const d = a + 1;
                    if (y !== 0) {
                      indices.push(a, b, d);
                    }
                    if (y !== heightSegments - 1) {
                      indices.push(b, c2, d);
                    }
                  }
                }
                const geometry = new Geometry();
                geometry.name = "HighQualitySphere";
                geometry.attributes.set("position", new VertexAttribute(new Float32Array(vertices)));
                geometry.attributes.set("normal", new VertexAttribute(new Float32Array(normals)));
                geometry.attributes.set("uv", new VertexAttribute(new Float32Array(uvs)));
                geometry.index = new IndexAttribute(new Uint32Array(indices));
                geometry.ComputeTangents();
                return geometry;
              }
              await Runtime.Create(canvas, window.devicePixelRatio);
              const scene = Runtime.SceneManager.CreateScene("DefaultScene");
              Runtime.SceneManager.SetActiveScene(scene);
              const mainCameraGameObject = new GameObject();
              mainCameraGameObject.name = "MainCamera";
              const camera = mainCameraGameObject.AddComponent(Components.Camera);
              camera.SetPerspective(72, canvas.width / canvas.height, 0.5, 500);
              mainCameraGameObject.transform.position.set(0, 0, 7);
              mainCameraGameObject.transform.LookAtV1(new Mathf.Vector3(0, 0, 0));
              new OrbitControls(canvas, camera);
              const lightGameObject = new GameObject();
              lightGameObject.transform.position.set(0, 0, 0);
              lightGameObject.transform.LookAtV1(new Mathf.Vector3(0, 0, 0));
              const light = lightGameObject.AddComponent(Components.DirectionalLight);
              light.intensity = 0;
              light.castShadows = false;
              const sphereGeometry = HighQualitySphere();
              const c = 8;
              const cM1 = c - 1;
              for (let i = 0; i < c; i++) {
                const sphereGameObject = new GameObject();
                sphereGameObject.transform.position.set((i - cM1 * 0.5) * 1.5, 1, 0);
                const sphereMesh = sphereGameObject.AddComponent(Components.Mesh);
                sphereMesh.geometry = sphereGeometry;
                sphereMesh.material = new PBRMaterial({
                  albedoColor: new Mathf.Color(1, 1, 1, 1),
                  metalness: 1,
                  roughness: i / cM1
                });
              }
              for (let i = 0; i < c; i++) {
                const sphereGameObject = new GameObject();
                sphereGameObject.transform.position.set((i - cM1 * 0.5) * 1.5, -1, 0);
                const sphereMesh = sphereGameObject.AddComponent(Components.Mesh);
                sphereMesh.geometry = sphereGeometry;
                sphereMesh.material = new PBRMaterial({
                  albedoColor: new Mathf.Color(0, 0, 0, 1),
                  metalness: 0,
                  roughness: i / cM1
                });
                console.log(i / cM1);
              }
              Debugger.Enable();
              const hdr = await HDRParser.Load("./assets/textures/HDR/pisa.hdr");
              const skyTexture = await HDRParser.ToCubemap(hdr);
              const environment = new Environment(scene, skyTexture);
              await environment.init();
              Runtime.Play();
            }
            Application(document.querySelector("canvas"));
            
            </script>
        </body>
    </html>
